services:
  mongo:
    image: mongo:7
    container_name: fittyfit-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - fittyfit_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fittyfit-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: fittyfit
      CORS_ORIGINS: "*"
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-sk-emergent-18243F0524e5d0aA7C}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fittyfit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001
      WDS_SOCKET_PORT: "0"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: yarn start

volumes:
  fittyfit_mongo:
